name: PMD Code Analysis

on:
  pull_request:
    branches:
      - dev

jobs:
  run-pmd:
    name: Run PMD on PR to dev
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run PMD, SpotBugs analysis
        run: mvn --batch-mode clean verify site

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Extract analysis summaries
        id: analysis-summary
        run: |
          # Initialize variables
          PMD_VIOLATIONS=0
          PMD_FILES=0
          SPOTBUGS_BUGS=0
          
          # Parse PMD report if exists
          if [ -f target/pmd.xml ]; then
            PMD_VIOLATIONS=$(grep -c '<violation' target/pmd.xml || true)
            PMD_FILES=$(grep -c '<file' target/pmd.xml || true)
          fi
          
          # Parse SpotBugs report if exists
          if [ -f target/spotbugsXml.xml ]; then
            SPOTBUGS_BUGS=$(grep -o -E "total_bugs=['\"]?[0-9]+['\"]?" target/spotbugsXml.xml | head -1 | sed -E 's/[^0-9]//g')
            [ -z "$SPOTBUGS_BUGS" ] && SPOTBUGS_BUGS=0
          fi
          
          # Create markdown summary
          SUMMARY="## 🔍 Code Analysis Report \n\n"
          
          # PMD section
          SUMMARY+=" ### PMD"
          if [ "$PMD_VIOLATIONS" -eq "0" ]; then
            SUMMARY+=" ✅ No violations found\n\n"
          else
            SUMMARY+=" ❌ $PMD_VIOLATIONS violations in $PMD_FILES files\n\n"
          fi
          
          # SpotBugs section
          SUMMARY+="  ### SpotBugs"
          if [ "$SPOTBUGS_BUGS" -eq "0" ]; then
            SUMMARY+=" ✅ No bugs found\n\m"
          else
            SUMMARY+=" ❌ $SPOTBUGS_BUGS bugs found\n\n"
          fi
          
          # Add download link
          REPORT_LINK="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          SUMMARY+=" 📥 [Download Full Reports]($REPORT_LINK)\n\n"
          
          if [ "$PMD_VIOLATIONS" -gt "0" ]; then
            SUMMARY+=" <details><summary>PMD Violation Breakdown</summary>"
            
            # Use a simpler approach to parse PMD XML
            # Extract file paths and count violations per file
            while IFS= read -r file_line; do
              # Extract file path from <file name="path">
              file_path=$(echo "$file_line" | sed -n 's/.*<file name="\([^"]*\)".*/\1/p')
              
              if [ -n "$file_path" ]; then
                # Remove workspace prefix for cleaner display
                clean_path="${file_path#$GITHUB_WORKSPACE/}"
                
                # Count violations for this file
                violation_count=$(grep -c "<violation" <<< "$file_line" || echo "0")
                
                if [ "$violation_count" -gt 0 ]; then
                  SUMMARY+=" \`${clean_path} \`"
                fi
              fi
            done < <(awk '/<file /{printf "%s", $0; next} /<\/file>/{print; next} {printf "%s", $0}' target/pmd.xml)
            
            SUMMARY+=" </details>"
          fi
          
          if [ "$SPOTBUGS_BUGS" -gt "0" ]; then
            SUMMARY+=" <details><summary>SpotBugs Bug Breakdown</summary>"
            
            # Improved extraction of file paths and bug counts
            while IFS= read -r line; do
              # Extract path value
              path="${line#*path=}"
              path="${path%% *}"
              path="${path#\'}"
              path="${path%\'}"
              path="${path#\"}"
              path="${path%\"}"
              
              # Extract bugCount value
              bugCount="${line#*bugCount=}"
              bugCount="${bugCount%% *}"
              bugCount="${bugCount#\'}"
              bugCount="${bugCount%\'}"
              bugCount="${bugCount#\"}"
              bugCount="${bugCount%\"}"
              
              if [ -n "$path" ] && [ -n "$bugCount" ]; then
                SUMMARY+=" \`${path} - ${bugCount} bugs\`\n"
              fi
            done < <(grep -o "FileStats [^>]*" target/spotbugsXml.xml)
            
            SUMMARY+=" </details>"
          fi

          # Set output
          SUMMARY="${SUMMARY//\`/\\\`}"
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "$summary"


      - name: Upload PMD report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: target/site/

      - name: Upload Spotbugs report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugs.html

      - name: Post or update PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const summary = `${{ steps.analysis-summary.outputs.summary }}`;
              const { issue: { number: issueNumber }, repo: { owner, repo } } = context;
              
              // Identifier for our comments
              const COMMENT_TAG = 'Code Analysis Report';
              const fullBody = `${COMMENT_TAG}\n\n${summary}\n\n<sub>🤖 Generated by GitHub Actions</sub>`;
              
              // Find existing comment
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: issueNumber
              });
              
              // Find our previous comment
              const existingComment = comments.find(comment => 
                comment.body.includes(COMMENT_TAG) &&
                comment.user.login === 'github-actions[bot]'
              );
              
              if (existingComment) {
                // Update existing comment
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingComment.id,
                  body: fullBody
                });
              } else {
                // Create new comment
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: fullBody
                });
              }
            } catch (error) {
              console.error('Error posting comment:', error);
              if (error.status === 403) {
                console.warn('⚠️ Permission denied! Ensure workflow has "pull-requests: write" permission');
              }
            }